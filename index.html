<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QR Code Generator – Free, No Sign-Up</title>
    <meta
      name="description"
      content="Create QR codes for text, URLs, Wi-Fi, and contacts. Free, private, no sign-up. Download as PNG, JPG, or SVG."
    />
    <meta name="author" content="Alexandre Vigneau" />
    <meta name="theme-color" content="#ffdb33" />
    <link rel="canonical" href="https://qrcode.avigneau.dev/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QR Code Generator" />
    <meta property="og:title" content="QR Code Generator – Free, No Sign-Up" />
    <meta
      property="og:description"
      content="Create QR codes for text, URLs, Wi-Fi, and contacts. Free, private, no sign-up. Download as PNG, JPG, or SVG."
    />
    <meta property="og:url" content="https://qrcode.avigneau.dev/" />
    <meta property="og:image" content="https://qrcode.avigneau.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="QR Code Generator preview" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR Code Generator – Free, No Sign-Up" />
    <meta
      name="twitter:description"
      content="Create QR codes for text, URLs, Wi-Fi, and contacts. Free, private, no sign-up."
    />
    <meta name="twitter:image" content="https://qrcode.avigneau.dev/og-image.png" />
    <meta name="twitter:image:alt" content="QR Code Generator preview" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "QR Code Generator",
        "url": "https://qrcode.avigneau.dev/",
        "description": "Create QR codes for text, URLs, Wi-Fi, and contacts. Free, private, no sign-up. Download as PNG, JPG, or SVG.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript and a modern browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Alexandre Vigneau",
          "url": "https://avigneau.dev"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
